  "mainEntity":[

      "@type":"Question",
      "name":"Quand et comment peut-on réserver ?",
      "acceptedAnswer":{
        "@type":"Answer",
        "text":"Chaque mariage est unique. Je crée donc des propositions sur mesure, selon vos besoins et votre vision. Il suffit de vérifier ma disponibilité. Si je suis libre, je vous envoie une proposition personnalisée. La plupart de mes clients réservent entre 12 et 18 mois à l’avance."
      }
    },
    {
      "@type":"Question",
      "name":"Quel est ton style de photos ?",
      "acceptedAnswer":{
        "@type":"Answer",
        "text":"Mon style se situe entre le naturel et le soigné. J’aime les images qui racontent quelque chose de vrai : un éclat de rire, un geste tendre, un moment qui passe sans qu’on s’en rende compte. J’utilise à la fois le numérique et la pellicule. Le numérique me permet de capter l’instant avec justesse, tandis que l’argentique ajoute cette touche intemporelle, presque organique, qui fait toute la différence. Mon approche est discrète, sensible, toujours guidée par l’émotion."
      }
    }
  ]
}
